name: Setup Maven Settings
description: "Retrieves and sets up Maven settings.xml and configures repository environment variables"

inputs:
  m2-directory:
    description: "Path to the .m2 directory"
    required: false
    default: "/root/.m2"
  artifactory-base-url:
    description: "Artifactory base URL"
    required: true
  artifactory-host:
    description: "Artifactory host"
    required: true
  artifactory-user:
    description: "Artifactory username"
    required: true
  artifactory-api-key:
    description: "Artifactory API key"
    required: true

runs:
  using: "composite"
  steps:

    - name: Retrieve settings file
      id: common-maven
      uses: pentaho/actions-common@stable

    - name: Copy settings.xml to Maven directory
      shell: bash
      run: |
        mkdir -p "${{ inputs.m2-directory }}"
        cp "${{ steps.common-maven.outputs.settings-file-path }}" "${{ inputs.m2-directory }}/"

    - name: Configure Maven repository environment variables
      shell: bash
      run: |
        # Set Maven settings environment variables required by settings.xml
        echo "RESOLVE_REPO_MIRROR=${{ format('{0}/{1}', inputs.artifactory-base-url, 'pnt-mvn') }}" >> $GITHUB_ENV
        echo "NEXUS_DEPLOY_USER=${{ inputs.artifactory-user }}" >> $GITHUB_ENV
        echo "NEXUS_DEPLOY_PASSWORD=${{ inputs.artifactory-api-key }}" >> $GITHUB_ENV
        echo "DOCKER_PULL_REGISTRY=${{ inputs.artifactory-host }}/pnt-docker/" >> $GITHUB_ENV
        echo "MAVEN_ARGS=-Dmaven.repo.local=/m2_local_cache/ -s ${{ inputs.m2-directory }}/settings.xml" >> $GITHUB_ENV
