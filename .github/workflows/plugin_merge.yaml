# Merge trigger: runs the integration tests (build apachevanilla plugin + docker ITs) on pushes
# to main and release branches.
name: Plugin Merge

on:
  push:
    branches:
      - master
      - release/*
    paths:
      # 1. Include all files
      - "**"

      # 2. Exclude docs / non-code changes
      - "!**/*.md"
      - "!**/*.markdown"
      - "!**/*.txt"
      - "!dev-doc/**"
      - "!LICENSE.txt"
      - "!README.markdown"

      # 3. Exclude other workflows/actions changes...
      - "!.github/**"

      # 4. ...but re-include the IT pipeline files so changes to them are validated
      - ".github/workflows/plugin_merge.yaml"
      - ".github/workflows/integration_tests.yaml"
      - ".github/actions/**"
      - ".github/settings.xml"

concurrency:
  group: plugin-merge-${{ github.ref }}
  cancel-in-progress: false

jobs:
  integration-tests:
    uses: ./.github/workflows/integration_tests.yaml
    with:
      runs_on: k8s
      plugin_variant: apachevanilla
    secrets: inherit
